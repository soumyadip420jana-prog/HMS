{% extends 'base.html' %}

{% block title %}Edit Booking{% endblock title %}

{% block body %}

<section class="edit-section">
    <div class="edit-card">

        <h4>&#9998; Update Your Slot</h4>

        <form action="/edit/{{ posts.pid }}" method="post" novalidate>

            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" class="form-control" id="email"
                               value="{{ current_user.email }}" name="email" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" class="form-control" id="name" name="name"
                       value="{{ posts.name }}" placeholder="Full Name" required>
            </div>

            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select class="form-control" id="gender" name="gender" required>
                            <option selected>{{ posts.gender }}</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label for="slot">Slot</label>
                        <select class="form-control" id="slot" name="slot" required>
                            <option selected>{{ posts.slot }}</option>
                            <option value="morning">&#127774; Morning</option>
                            <option value="evening">&#127783;&#65039; Evening</option>
                            <option value="night">&#127762; Night</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label for="time">Time</label>
                        <input type="time" class="form-control" id="time"
                               value="{{ posts.time }}" name="time" required>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" class="form-control" id="date"
                               value="{{ posts.date }}" name="date" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="disease">Condition / Disease</label>
                <input type="text" class="form-control" id="disease" name="disease"
                       value="{{ posts.disease }}" placeholder="Disease" required>
            </div>

            <div class="form-group">
                <label for="dept">Doctor Department</label>
                <input type="text" class="form-control" id="dept" name="dept"
                       value="{{ posts.dept }}" placeholder="Doctor Dept" required>
            </div>

            <div class="form-group">
                <label for="number">Phone Number</label>
                <input type="number" class="form-control" id="number" name="number"
                       value="{{ posts.number }}" placeholder="Phone Number" required>
            </div>

            <div style="margin-top:1.5rem;">
                <button type="submit" class="btn btn-warning btn-block"
                        style="padding:0.8rem; font-size:1rem; border-radius:10px;">
                    &#9998; Update Booking
                </button>
            </div>

        </form>
    </div>
</section>

{% endblock body %}
